# ===========================================
# softBITS AdminIT - Nginx Configuration
# Serves React SPA and proxies API requests to softbits-bridge
# ===========================================

server {
    listen 3080;
    server_name localhost;

    # Root directory for React static files
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    gzip_disable "MSIE [1-6]\.";

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Docker DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=30s ipv6=off;

    # API proxy - forward to softbits-bridge
    location /api/ {
        set $bridge_server softbits-bridge;
        proxy_pass http://$bridge_server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Internal-Service "softbits-admin";
        proxy_set_header X-Internal-Token "${INTERNAL_SERVICE_SECRET}";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Health check endpoint (local - for Docker healthcheck)
    location = /nginx-health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Bridge health endpoint (proxied for dashboard data)
    location = /health {
        set $bridge_server softbits-bridge;
        proxy_pass http://$bridge_server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket proxy to Bridge
    location /ws {
        set $bridge_server softbits-bridge;
        proxy_pass http://$bridge_server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # Work service (N8N/Infuse) proxy - forward to infuse-work
    # Note: rewrite is required because proxy_pass with variables ($work_server)
    # does not perform automatic path replacement like literal proxy_pass does
    location /work/ {
        set $work_server infuse-work;
        rewrite ^/work/(.*) /$1 break;
        proxy_pass http://$work_server:3990;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Internal-Service "softbits-admin";
        proxy_set_header X-Internal-Token "${INTERNAL_SERVICE_SECRET}";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # softbits-bridge admin routes
    location /admin/ {
        set $bridge_server softbits-bridge;
        proxy_pass http://$bridge_server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Internal-Service "softbits-admin";
        proxy_set_header X-Internal-Token "${INTERNAL_SERVICE_SECRET}";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Static assets - long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Prevent caching of index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
